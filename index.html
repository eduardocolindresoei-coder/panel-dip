<script>
const UNITS=[
  {n:"I",t:"Introducción al DIP",s:["Concepto, características y fundamentos","Relaciones DIP y derecho interno","Monismo y dualismo (Arts. 144-149 Cn. SV)","Historia y evolución del DIP"]},
  {n:"II",t:"Sujetos del DIP",s:["Estado como sujeto principal","Organizaciones internacionales","Individuo en el DIP contemporáneo","Subjetividad internacional"]},
  {n:"III",t:"Fuentes del DIP",s:["Art. 38 Estatuto CIJ","Tratados internacionales","Costumbre internacional","Principios generales del derecho","Jurisprudencia y doctrina","CVDT (Viena 1969)","Jus cogens y obligaciones erga omnes"]},
  {n:"IV",t:"Competencias estatales",s:["Territorio y soberanía","Jurisdicción personal y extraterritorial","Inmunidades del Estado","Responsabilidad internacional","Derecho transfronterizo (Trail Smelter)","Plan Trifinio y río Lempa","Convenio de Escazú 2018"]},
  {n:"V",t:"Órganos de RRII",s:["Órganos internos del Estado","Diplomacia: estatuto jurídico","Consulados y funciones","Convenciones de Viena 1961/1963"]},
  {n:"VI",t:"Organizaciones Internacionales",s:["Concepto y clasificación","ONU: estructura y funciones","SICA y comparativa UE"]},
  {n:"VII",t:"Aplicación del DIP",s:["Cumplimiento y mecanismos","Arreglo pacífico de controversias","CIJ: competencia y jurisprudencia","Caso SV/Honduras (CIJ 1992)","Masacres de El Mozote (CIDH)","Caso Avena (CIJ 2004)"]},
  {n:"VIII",t:"DIDH",s:["Sistema universal de DDHH","Sistema interamericano","El Salvador y obligaciones convencionales"]}
];

const SYS=`Eres un asistente académico especializado en Derecho Internacional Público (DIP). Tu base de conocimiento incluye:
FUENTES PRINCIPALES: Art. 38 Estatuto CIJ. CVDT (Viena 1969): arts. 2, 11-17. Carta ONU. Estatuto CIJ.
AUTORES: Pastor Ridruejo, Diez de Velasco.
JURISPRUDENCIA: Trail Smelter, CIJ SV/Honduras 1992, Caso Avena, El Mozote.
CONTEXTO SV: Arts. 144-149 Cn. SV, SICA.
INSTRUCCIONES: Responde en español académico-jurídico. Cita artículos y autores.`;

let msgs=[], selSub=null, loading=false, apiKey='';

function init(){
  apiKey=localStorage.getItem('dip_gemini_key')||'';
  if(apiKey) document.getElementById('key-modal').classList.add('hidden');
  buildSidebar();
  renderChat();
}

function saveKey(){
  const k=document.getElementById('key-input').value.trim();
  if(!k){alert('Por favor ingrese una API Key válida.');return;}
  apiKey=k;
  localStorage.setItem('dip_gemini_key',k);
  document.getElementById('key-modal').classList.add('hidden');
}

function changeKey(){
  document.getElementById('key-input').value=apiKey;
  document.getElementById('key-modal').classList.remove('hidden');
}

function buildSidebar(){
  const c=document.getElementById('units');
  c.innerHTML='';
  UNITS.forEach((u,i)=>{
    const d=document.createElement('div');
    d.className='unit';
    d.innerHTML=`<div class="unit-header" id="uh${i}" onclick="toggle(${i})">
      <div><div class="unit-num">UNIDAD ${u.n}</div><div class="unit-label">${u.t}</div></div>
      <span class="chevron" id="ch${i}">▼</span></div>
      <div class="subtopics" id="st${i}">${u.s.map((s,j)=>`<div class="subtopic" id="sb${i}_${j}" onclick="pickSub(${i},${j})">${s}</div>`).join('')}</div>`;
    c.appendChild(d);
  });
}

function toggle(i){
  const st=document.getElementById('st'+i),ch=document.getElementById('ch'+i),uh=document.getElementById('uh'+i);
  const o=st.classList.toggle('open');
  ch.classList.toggle('open',o);
  uh.classList.toggle('active',o);
}

function pickSub(i,j){
  if(selSub){const p=document.getElementById('sb'+selSub);if(p)p.classList.remove('selected');}
  selSub=i+'_'+j;
  document.getElementById('sb'+i+'_'+j).classList.add('selected');
  const u=UNITS[i],s=u.s[j];
  document.getElementById('topic-title').textContent=s;
  document.getElementById('topic-sub').textContent=`Unidad ${u.n} · ${u.t}`;
  msgs=[];
  ask(`Explícame el tema: "${s}" (Unidad ${u.n}: ${u.t}) con profundidad académica universitaria, citando fuentes y autores relevantes.`);
}

function renderChat(){
  const chat=document.getElementById('chat');
  if(!msgs.length){
    chat.innerHTML=`<div class="empty"><div class="empty-icon">⚖</div><p>Seleccione un tema o escriba su consulta</p></div>`;
    return;
  }
  chat.innerHTML='';
  msgs.forEach(m=>{
    const d=document.createElement('div');
    d.className='msg '+(m.role==='user'?'user':'ai');
    if(m.role==='assistant') d.innerHTML=`<span class="tag">Análisis Jurídico</span><div class="msg-content">${m.content}</div>`;
    else d.textContent=m.content;
    chat.appendChild(d);
  });
  chat.scrollTop=chat.scrollHeight;
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function sendMessage(){
  const inp=document.getElementById('input'),t=inp.value.trim();
  if(!t||loading)return;
  inp.value='';
  ask(t);
}

async function ask(text){
  if(loading)return;
  loading=true;
  document.getElementById('send-btn').disabled=true;
  msgs.push({role:'user',content:text});
  renderChat();
  
  const chat=document.getElementById('chat');
  const typ=document.createElement('div');
  typ.className='typing';typ.innerHTML='<span></span><span></span><span></span>';
  chat.appendChild(typ);
  chat.scrollTop=chat.scrollHeight;

  try{
    const geminiMsgs=msgs.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
    
    // USANDO LA VERSIÓN V1 ESTABLE
    const r=await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:SYS}]},
        contents:geminiMsgs,
        generationConfig:{maxOutputTokens:1500}
      })
    });
    
    const d=await r.json();
    if(typ) typ.remove();

    if(d.error){
      msgs.push({role:'assistant',content:'Error: '+d.error.message});
    } else {
      msgs.push({role:'assistant',content:d.candidates[0].content.parts[0].text});
    }
  } catch(e) {
    if(typ) typ.remove();
    msgs.push({role:'assistant',content:'Error de red. Verifique su conexión.'});
  }
  
  loading=false;
  document.getElementById('send-btn').disabled=false;
  renderChat();
}

init();
</script>
